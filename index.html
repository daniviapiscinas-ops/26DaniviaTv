<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DANIVIA TV · NeWeDeN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a12;--bg2:#07111e;--surface:#0a1828;--surface2:#0d1f35;
  --border:rgba(0,180,255,0.15);--border-hot:rgba(0,200,255,0.45);
  --cyan:#00c8ff;--cyan-dim:#0090bb;--cyan-glow:rgba(0,200,255,0.2);
  --gold:#ffd060;--text:#d4eaf7;--muted:#4a7090;
  --danger:#ff4560;--success:#00e5a0;
  --feat-bg:rgba(255,208,96,0.07);--feat-border:rgba(255,208,96,0.3);
  --r:10px;--font-hud:'Orbitron',monospace;--font-body:'Exo 2',system-ui,sans-serif
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(0,160,255,.16) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 10% 80%,rgba(0,100,200,.09) 0%,transparent 50%);pointer-events:none;z-index:0}

.wrapper{position:relative;z-index:1;max-width:1040px;margin:0 auto;padding:0 20px 100px}

/* HEADER */
.site-header{padding:26px 0 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:40px}
.brand{display:flex;align-items:center;gap:14px}
.logo-img{width:54px;height:54px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(0,200,255,0.8))}
.brand-text{display:flex;flex-direction:column;line-height:1;gap:2px}
.brand-neweden{font-family:var(--font-hud);font-size:.56rem;font-weight:600;letter-spacing:.38em;color:var(--cyan);text-shadow:0 0 12px var(--cyan);text-transform:uppercase}
.brand-danivia{font-family:var(--font-hud);font-size:1.65rem;font-weight:900;letter-spacing:.07em;color:var(--cyan);text-shadow:0 0 22px var(--cyan),0 0 55px rgba(0,200,255,.35);line-height:1}
.brand-tv{font-family:var(--font-hud);font-size:.62rem;font-weight:400;letter-spacing:.45em;color:var(--cyan-dim)}
.hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px}
#statusChip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-hud);font-size:.56rem;font-weight:600;letter-spacing:.12em;padding:5px 13px;border-radius:100px;border:1px solid var(--border);color:var(--muted);transition:all .4s}
#statusChip .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:all .4s}
#statusChip.live{border-color:rgba(0,229,160,.4);color:var(--success)}
#statusChip.live .dot{background:var(--success);box-shadow:0 0 8px var(--success);animation:blink 1.8s infinite}
#statusChip.error{border-color:rgba(255,69,96,.4);color:var(--danger)}
#statusChip.error .dot{background:var(--danger)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#dateLabel{font-family:var(--font-hud);font-size:.56rem;font-weight:600;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}

/* NAV TABS */
.nav-tabs{display:flex;gap:4px;margin-bottom:36px;border-bottom:1px solid var(--border);padding-bottom:0}
.nav-tab{font-family:var(--font-hud);font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:10px 20px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.nav-tab:hover{color:var(--cyan-dim)}
.nav-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}

/* SECTION */
.tab-section{display:none}.tab-section.active{display:block}
.section-title{font-family:var(--font-hud);font-size:.6rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--cyan-dim);display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-hot),transparent)}

/* SKELETON */
.skeleton{display:flex;flex-direction:column;gap:10px}
.skel-row{height:62px;border-radius:var(--r);background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite}
.skel-card{height:280px;border-radius:var(--r);background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* AGENDA */
.agenda-root{display:flex;flex-direction:column;gap:32px}
.cat-block{animation:fadeUp .5s ease both}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cat-icon{font-size:1.1rem}
.cat-sport{font-family:var(--font-hud);font-size:.7rem;font-weight:700;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase}
.cat-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border-hot),transparent)}
.events-list{display:flex;flex-direction:column;gap:5px}
.event-card{display:grid;grid-template-columns:70px 1fr auto;align-items:center;gap:14px;padding:13px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:all .2s;position:relative;overflow:hidden;animation:fadeUp .4s ease both}
.event-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cyan-dim);opacity:0;transition:opacity .2s}
.event-card:hover{border-color:var(--border-hot);background:var(--surface2);box-shadow:0 0 18px rgba(0,200,255,.07)}
.event-card:hover::before{opacity:1}
.event-card.feat{background:var(--feat-bg);border-color:var(--feat-border)}
.event-card.feat::before{background:var(--gold);opacity:1}
.ev-time{font-family:var(--font-hud);font-size:.95rem;font-weight:600;color:var(--cyan);white-space:nowrap}
.event-card.feat .ev-time{color:var(--gold)}
.ev-body{min-width:0}
.ev-title{font-weight:600;font-size:.88rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-desc{font-size:.76rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-channel{font-family:var(--font-hud);font-size:.56rem;font-weight:600;padding:4px 10px;border-radius:6px;white-space:nowrap;background:var(--cyan-glow);color:var(--cyan-dim);border:1px solid var(--border);max-width:140px;overflow:hidden;text-overflow:ellipsis}
.event-card.feat .ev-channel{background:rgba(255,208,96,.08);color:var(--gold);border-color:var(--feat-border)}
.feat-badge{position:absolute;top:6px;right:10px;font-family:var(--font-hud);font-size:.48rem;font-weight:700;color:var(--gold);opacity:.8}

/* CARDS GRID (películas/series) */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px}
.media-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .2s;animation:fadeUp .4s ease both;cursor:default}
.media-card:hover{border-color:var(--border-hot);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,200,255,.1)}
.media-card-img{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--surface2);display:block}
.media-card-img.no-img{display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--muted)}
.media-card-body{padding:12px}
.media-card-title{font-weight:600;font-size:.85rem;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.media-card-meta{font-size:.72rem;color:var(--muted)}
.media-card-badge{display:inline-block;font-family:var(--font-hud);font-size:.5rem;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:4px;margin-top:6px;background:var(--cyan-glow);color:var(--cyan-dim);border:1px solid var(--border)}
.media-card.new-badge .media-card-badge{background:rgba(255,208,96,.1);color:var(--gold);border-color:var(--feat-border)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:.85rem}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px;display:block}

/* ADMIN */
.admin-bar{margin-top:50px;display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-family:var(--font-hud);font-size:.6rem;font-weight:600;letter-spacing:.1em;cursor:pointer;border:none;transition:all .2s;text-transform:uppercase}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--cyan-dim);border-color:var(--border-hot)}
.btn-primary{background:linear-gradient(135deg,#0080aa,#00c8ff);color:#050a12;font-weight:700}
.btn-primary:hover{filter:brightness(1.12)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;filter:none}
.btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(255,69,96,.3)}
.btn-danger:hover{background:rgba(255,69,96,.08)}
.btn-success{background:linear-gradient(135deg,#00a070,#00e5a0);color:#050a12;font-weight:700}
.btn-sm{padding:6px 12px;font-size:.54rem}
.btn-icon{padding:6px 10px;font-size:.8rem}

#adminPanel{display:none;margin-top:18px;background:var(--surface);border:1px solid var(--border-hot);border-radius:var(--r);overflow:hidden}
#adminPanel.open{display:block}

/* ADMIN TABS */
.admin-nav{display:flex;border-bottom:1px solid var(--border);background:var(--bg2)}
.admin-tab{font-family:var(--font-hud);font-size:.56rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:12px 18px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.admin-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.admin-section{display:none;padding:24px}.admin-section.active{display:block}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.full{grid-template-columns:1fr}
.field-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
label{font-family:var(--font-hud);font-size:.53rem;font-weight:600;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
input[type=text],input[type=password],input[type=url],input[type=number],textarea,select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Exo 2',system-ui;font-size:.85rem;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,textarea:focus,select:focus{border-color:var(--cyan-dim);box-shadow:0 0 0 3px rgba(0,200,255,.08)}
select option{background:var(--bg2);color:var(--text)}
textarea{resize:vertical;min-height:80px;font-family:'Courier New',monospace;font-size:.8rem}
.hint{font-size:.7rem;color:var(--muted);font-style:italic;margin-top:3px}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--cyan);cursor:pointer}
.check-row{display:flex;align-items:center;gap:8px;margin-top:4px}

/* ITEMS LIST (admin) */
.admin-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.admin-item{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.admin-item-info{flex:1;min-width:0}
.admin-item-title{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-item-sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.admin-item-actions{display:flex;gap:6px;flex-shrink:0}

/* CAT BLOCK ADMIN */
.cat-admin-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.cat-admin-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
.cat-admin-events{padding:12px 16px;display:flex;flex-direction:column;gap:8px}

/* PANEL HEAD/FOOT */
.panel-head{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:var(--bg2)}
.panel-head h2{font-family:var(--font-hud);font-size:.65rem;font-weight:700;letter-spacing:.22em;color:var(--cyan);text-transform:uppercase}
.save-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
#saveMsg{font-family:var(--font-hud);font-size:.58rem;font-weight:600;letter-spacing:.1em;opacity:0;transition:opacity .3s}
#saveMsg.show{opacity:1}
#saveMsg.ok{color:var(--success)}
#saveMsg.err{color:var(--danger)}

/* AUTH MODAL */
#authModal{display:none;position:fixed;inset:0;background:rgba(2,8,16,.88);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center}
#authModal.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border-hot);border-radius:var(--r);padding:36px;width:100%;max-width:360px;box-shadow:0 0 60px rgba(0,200,255,.14);animation:fadeUp .3s ease}
.modal-box h3{font-family:var(--font-hud);font-size:.75rem;font-weight:700;letter-spacing:.22em;color:var(--cyan);text-transform:uppercase;margin-bottom:4px}
.modal-box p{font-size:.8rem;color:var(--muted);margin-bottom:24px}
#authError{font-size:.77rem;color:var(--danger);min-height:18px;margin-top:10px}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 0}

/* IMAGE PREVIEW */
.img-preview{width:80px;height:110px;object-fit:cover;border-radius:6px;border:1px solid var(--border);background:var(--bg2);display:block}

@media(max-width:600px){
  .event-card{grid-template-columns:58px 1fr}
  .ev-channel{display:none}
  .brand-danivia{font-size:1.3rem}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>

<script>
// ── FIREBASE ───────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCQ34PxT2NArMNPA-dM-rDTnVPNFfQJ4LY",
  authDomain:        "daniviatv-a1e12.firebaseapp.com",
  projectId:         "daniviatv-a1e12",
  storageBucket:     "daniviatv-a1e12.firebasestorage.app",
  messagingSenderId: "631143163920",
  appId:             "1:631143163920:web:0e0e4c76d16b1ff600c295"
};
firebase.initializeApp(firebaseConfig);
const db      = firebase.firestore();
const auth    = firebase.auth();
const storage = firebase.storage();

// ── STATE ──────────────────────────────────────────────────
let agendaData   = [];
let peliculasData= [];
let seriesData   = [];
let isAdminOpen  = false;
let currentUser  = null;

// ── DOM ────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

// ── NAV TABS ───────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

document.querySelectorAll('.admin-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    $(btn.dataset.atab).classList.add('active');
  });
});

// ── FIRESTORE LISTENERS ────────────────────────────────────
db.collection('siteContent').doc('agenda').onSnapshot(doc => {
  if (!doc.exists) { setStatus('error','SIN DATOS'); return; }
  const d = doc.data();
  $('dateLabel').textContent   = d.dateLabel || '';
  $('adminDateLabel').value    = d.dateLabel || '';
  let grouped = [];
  try { grouped = JSON.parse(d.agendaData || '[]'); }
  catch(e) { grouped = []; }
  // Flatten grouped structure into flat list for admin
  agendaData = [];
  grouped.forEach(cat => {
    (cat.events||[]).forEach(ev => {
      agendaData.push({...ev, sport: cat.sport, cat: cat.cat});
    });
  });
  renderAgenda(grouped);
  renderEvList();
  setStatus('live','EN VIVO');
}, err => { setStatus('error','ERROR'); console.error(err); });

db.collection('siteContent').doc('peliculas').onSnapshot(doc => {
  if (!doc.exists) { peliculasData = []; }
  else {
    try { peliculasData = JSON.parse(doc.data().items || '[]'); }
    catch(e) { peliculasData = []; }
  }
  renderMediaGrid('peliculasGrid', peliculasData, '🎬');
  renderAdminList('peliculasList', peliculasData, 'pelicula');
}, err => console.error(err));

db.collection('siteContent').doc('series').onSnapshot(doc => {
  if (!doc.exists) { seriesData = []; }
  else {
    try { seriesData = JSON.parse(doc.data().items || '[]'); }
    catch(e) { seriesData = []; }
  }
  renderMediaGrid('seriesGrid', seriesData, '📺');
  renderAdminList('seriesList', seriesData, 'serie');
}, err => console.error(err));

// ── RENDER AGENDA ──────────────────────────────────────────
const catIcons = {tenis:'🎾',moto:'🏍️',motogp:'🏍️',futbol:'⚽',formula1:'🏎️',f1:'🏎️',baloncesto:'🏀',ciclismo:'🚴',atletismo:'🏃',natacion:'🏊',golf:'⛳',boxeo:'🥊',rugby:'🏉',default:'📺'};
const getIcon = cat => catIcons[(cat||'').toLowerCase()] || catIcons.default;
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function renderAgenda(cats) {
  $('agendaSkeleton').style.display = 'none';
  const root = $('agendaRoot');
  root.style.display = 'flex';
  root.innerHTML = '';
  if (!cats.length) {
    root.innerHTML = '<div class="empty-state"><span class="icon">📅</span>No hay eventos programados hoy.</div>';
    return;
  }
  cats.forEach((cat, ci) => {
    const block = document.createElement('div');
    block.className = 'cat-block';
    block.style.animationDelay = ci*80+'ms';
    const evHTML = (cat.events||[]).map((ev,ei) => {
      const f = ev.feat===true;
      return `<div class="event-card${f?' feat':''}" style="animation-delay:${ci*80+ei*50}ms">
        ${f?'<span class="feat-badge">★ DESTACADO</span>':''}
        <div class="ev-time">${esc(ev.t||'')}</div>
        <div class="ev-body">
          <div class="ev-title">${esc(ev.c||'')}</div>
          ${ev.m?`<div class="ev-desc">${esc(ev.m)}</div>`:''}
        </div>
        <div class="ev-channel">${esc(ev.ch||'')}</div>
      </div>`;
    }).join('');
    block.innerHTML = `<div class="cat-header"><span class="cat-icon">${getIcon(cat.cat)}</span><span class="cat-sport">${esc(cat.sport||cat.cat||'')}</span><div class="cat-line"></div></div><div class="events-list">${evHTML}</div>`;
    root.appendChild(block);
  });
}

// ── RENDER MEDIA GRID ──────────────────────────────────────
function renderMediaGrid(gridId, items, fallbackIcon) {
  const grid = $(gridId);
  grid.style.display = 'grid';
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">${fallbackIcon}</span>No hay contenido añadido aún.</div>`;
    return;
  }
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'media-card' + (item.isNew?' new-badge':'');
    card.style.animationDelay = i*60+'ms';
    const imgHTML = item.img
      ? `<img class="media-card-img" src="${esc(item.img)}" alt="${esc(item.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="media-card-img no-img" style="display:none">${fallbackIcon}</div>`
      : `<div class="media-card-img no-img">${fallbackIcon}</div>`;
    card.innerHTML = `${imgHTML}
      <div class="media-card-body">
        <div class="media-card-title">${esc(item.title||'')}</div>
        ${item.meta?`<div class="media-card-meta">${esc(item.meta)}</div>`:''}
        ${item.desc?`<div class="media-card-meta" style="margin-top:4px">${esc(item.desc)}</div>`:''}
        ${item.isNew?'<span class="media-card-badge">NOVEDAD</span>':''}
      </div>`;
    grid.appendChild(card);
  });
}

// ── RENDER ADMIN AGENDA ────────────────────────────────────


function renderAdminList(listId, items, type) {
  const list = $(listId);
  list.innerHTML = '';
  if (!items.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:.8rem;padding:8px 0">No hay elementos aún.</p>';
    return;
  }
  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'admin-item';
    el.innerHTML = `
      ${item.img?`<img src="${esc(item.img)}" style="width:40px;height:55px;object-fit:cover;border-radius:4px;border:1px solid var(--border)" onerror="this.style.display='none'"/>`:'<div style="width:40px;height:55px;background:var(--surface2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:1.2rem">'+(type==='pelicula'?'🎬':'📺')+'</div>'}
      <div class="admin-item-info">
        <div class="admin-item-title">${esc(item.title||'Sin título')}</div>
        <div class="admin-item-sub">${esc(item.meta||'')}${item.isNew?' · <span style="color:var(--gold)">NOVEDAD</span>':''}</div>
      </div>
      <div class="admin-item-actions">
        <button class="btn btn-danger btn-sm btn-icon" onclick="removeMedia('${type}',${i})">🗑</button>
      </div>`;
    list.appendChild(el);
  });
}

// ── AGENDA: ADD / REMOVE EVENTS ───────────────────────────
function renderEvList() {
  const list = $('evList');
  list.innerHTML = '';
  if (!agendaData.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:.8rem;padding:8px 0">No hay eventos aún.</p>';
    return;
  }
  agendaData.forEach((ev, i) => {
    const el = document.createElement('div');
    el.className = 'admin-item';
    el.innerHTML = `
      <div style="width:36px;height:36px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0">${getIcon(ev.cat)}</div>
      <div class="admin-item-info">
        <div class="admin-item-title">${esc(ev.t||'')} · ${esc(ev.c||'')}</div>
        <div class="admin-item-sub">${esc(ev.sport||ev.cat||'')} · ${esc(ev.ch||'')}${ev.feat?' · <span style="color:var(--gold)">★ DESTACADO</span>':''}</div>
      </div>
      <div class="admin-item-actions">
        <button class="btn btn-danger btn-sm btn-icon" onclick="removeAgendaEv(${i})">🗑</button>
      </div>`;
    list.appendChild(el);
  });
}

function removeAgendaEv(i) {
  agendaData.splice(i, 1);
  renderEvList();
  renderAgendaGrouped();
}

$('addEvBtn').addEventListener('click', () => {
  const titulo = $('evTitulo').value.trim();
  if (!titulo) { alert('El título es obligatorio'); return; }
  const deporte = $('evDeporte').value.trim() || 'Otros';
  agendaData.push({
    t:    $('evHora').value.trim(),
    c:    titulo,
    m:    $('evDesc').value.trim(),
    ch:   $('evCanal').value.trim(),
    feat: $('evFeat').checked,
    sport: deporte,
    cat:  deporte.toLowerCase().replace(/\s+/g,'')
  });
  renderEvList();
  renderAgendaGrouped();
  $('evHora').value=''; $('evTitulo').value=''; $('evDesc').value='';
  $('evCanal').value=''; $('evFeat').checked=false;
});

function renderAgendaGrouped() {
  // Group flat events by sport for public display
  const groups = {};
  agendaData.forEach(ev => {
    const key = ev.sport || ev.cat || 'Otros';
    if (!groups[key]) groups[key] = {cat: ev.cat||'otros', sport: key, events:[]};
    groups[key].events.push(ev);
  });
  renderAgenda(Object.values(groups));
}

// ── SAVE AGENDA ────────────────────────────────────────────
$('saveAgendaBtn').addEventListener('click', async () => {
  $('saveAgendaBtn').disabled = true;
  $('saveAgendaBtn').textContent = 'Guardando…';
  try {
    // Build grouped structure for storage
    const groups = {};
    agendaData.forEach(ev => {
      const key = ev.sport || ev.cat || 'Otros';
      if (!groups[key]) groups[key] = {cat: ev.cat||'otros', sport: key, events:[]};
      groups[key].events.push({t:ev.t,c:ev.c,m:ev.m,ch:ev.ch,feat:ev.feat});
    });
    await db.collection('siteContent').doc('agenda').set({
      agendaData:  JSON.stringify(Object.values(groups)),
      dateLabel:   $('adminDateLabel').value.trim(),
      lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge:true});
    showMsg('saveMsg','✓ Agenda guardada','ok');
  } catch(e) {
    showMsg('saveMsg','✗ Error: '+e.message,'err');
  } finally {
    $('saveAgendaBtn').disabled = false;
    $('saveAgendaBtn').textContent = '💾 Guardar Agenda';
  }
});

// ── MEDIA: ADD / REMOVE ────────────────────────────────────
$('addPeliculaBtn').addEventListener('click', () => {
  const title = $('pTitulo').value.trim();
  if (!title) { alert('El título es obligatorio'); return; }
  peliculasData.unshift({
    title, meta:$('pMeta').value.trim(),
    img:$('pImgUrl').value.trim(),
    desc:$('pDesc').value.trim(),
    isNew:$('pNew').checked
  });
  renderAdminList('peliculasList', peliculasData, 'pelicula');
  renderMediaGrid('peliculasGrid', peliculasData, '🎬');
  $('pTitulo').value='';$('pMeta').value='';$('pImgUrl').value='';$('pDesc').value='';$('pNew').checked=false;$('pImgPreview').style.display='none';
});

$('addSerieBtn').addEventListener('click', () => {
  const title = $('sTitulo').value.trim();
  if (!title) { alert('El título es obligatorio'); return; }
  seriesData.unshift({
    title, meta:$('sMeta').value.trim(),
    img:$('sImgUrl').value.trim(),
    desc:$('sDesc').value.trim(),
    isNew:$('sNew').checked
  });
  renderAdminList('seriesList', seriesData, 'serie');
  renderMediaGrid('seriesGrid', seriesData, '📺');
  $('sTitulo').value='';$('sMeta').value='';$('sImgUrl').value='';$('sDesc').value='';$('sNew').checked=false;$('sImgPreview').style.display='none';
});

function removeMedia(type, i) {
  if (type==='pelicula') {
    peliculasData.splice(i,1);
    renderAdminList('peliculasList',peliculasData,'pelicula');
    renderMediaGrid('peliculasGrid',peliculasData,'🎬');
  } else {
    seriesData.splice(i,1);
    renderAdminList('seriesList',seriesData,'serie');
    renderMediaGrid('seriesGrid',seriesData,'📺');
  }
}

// ── SAVE MEDIA ─────────────────────────────────────────────
$('savePeliculasBtn').addEventListener('click', async () => {
  $('savePeliculasBtn').disabled=true; $('savePeliculasBtn').textContent='Guardando…';
  try {
    await db.collection('siteContent').doc('peliculas').set({items:JSON.stringify(peliculasData),lastUpdated:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    showMsg('saveMsgP','✓ Películas guardadas','ok');
  } catch(e){ showMsg('saveMsgP','✗ '+e.message,'err'); }
  finally{ $('savePeliculasBtn').disabled=false; $('savePeliculasBtn').textContent='💾 Guardar cambios'; }
});

$('saveSeriesBtn').addEventListener('click', async () => {
  $('saveSeriesBtn').disabled=true; $('saveSeriesBtn').textContent='Guardando…';
  try {
    await db.collection('siteContent').doc('series').set({items:JSON.stringify(seriesData),lastUpdated:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    showMsg('saveMsgS','✓ Series guardadas','ok');
  } catch(e){ showMsg('saveMsgS','✗ '+e.message,'err'); }
  finally{ $('saveSeriesBtn').disabled=false; $('saveSeriesBtn').textContent='💾 Guardar cambios'; }
});

// ── IMAGE HELPERS ──────────────────────────────────────────
function previewImg(inputId, previewId) {
  const url = $(inputId).value.trim();
  const prev = $(previewId);
  if (url) { prev.src=url; prev.style.display='block'; }
  else { prev.style.display='none'; }
}

function handleFileUpload(input, urlInputId, previewId, folder) {
  const file = input.files[0];
  if (!file) return;
  const ref = storage.ref().child(folder+'/'+Date.now()+'_'+file.name);
  ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
    $(urlInputId).value = url;
    const prev = $(previewId);
    prev.src = url; prev.style.display='block';
  }).catch(e => alert('Error subiendo imagen: '+e.message));
}

// ── UTILS ──────────────────────────────────────────────────
function setStatus(type, msg) {
  $('statusChip').className = type;
  $('statusText').textContent = msg;
}

function showMsg(id, msg, type) {
  const el = $(id);
  el.textContent=msg; el.className=`show ${type}`;
  setTimeout(()=>el.className='',4500);
}

// ── ADMIN TOGGLE ───────────────────────────────────────────
$('adminToggleBtn').addEventListener('click', () => {
  if (!isAdminOpen) { currentUser ? openAdmin() : openAuthModal(); }
  else closeAdmin();
});

function openAdmin() {
  isAdminOpen=true;
  $('adminPanel').classList.add('open');
  $('adminToggleBtn').textContent='✕ Cerrar Admin';
  $('logoutBtn').style.display='inline-flex';
}

function closeAdmin() {
  isAdminOpen=false;
  $('adminPanel').classList.remove('open');
  $('adminToggleBtn').textContent='⚙ Admin';
}

$('logoutBtn').addEventListener('click', () => { auth.signOut(); closeAdmin(); });

// ── AUTH ───────────────────────────────────────────────────
auth.onAuthStateChanged(u => { currentUser=u; if(!u&&isAdminOpen) closeAdmin(); });

function openAuthModal() {
  $('authModal').classList.add('open');
  $('authError').textContent='';
  setTimeout(()=>$('authEmail').focus(),50);
}
function closeAuthModal() {
  $('authModal').classList.remove('open');
  $('authEmail').value=''; $('authPass').value=''; $('authError').textContent='';
}

$('cancelAuthBtn').addEventListener('click', closeAuthModal);
$('authModal').addEventListener('click', e=>{ if(e.target===$('authModal')) closeAuthModal(); });

$('loginBtn').addEventListener('click', async () => {
  $('authError').textContent='';
  const email=$('authEmail').value.trim(), pass=$('authPass').value;
  if(!email||!pass){ $('authError').textContent='Completa todos los campos.'; return; }
  $('loginBtn').disabled=true; $('loginBtn').textContent='Verificando…';
  try {
    await auth.signInWithEmailAndPassword(email,pass);
    closeAuthModal(); openAdmin();
  } catch(err) {
    const msgs={'auth/user-not-found':'Usuario no encontrado.','auth/wrong-password':'Contraseña incorrecta.','auth/invalid-email':'Email inválido.','auth/too-many-requests':'Demasiados intentos.','auth/invalid-credential':'Credenciales incorrectas.'};
    $('authError').textContent = msgs[err.code]||err.message;
  } finally { $('loginBtn').disabled=false; $('loginBtn').textContent='Acceder'; }
});

[$('authEmail'),$('authPass')].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')$('loginBtn').click();}));
</script>
